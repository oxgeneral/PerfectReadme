<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="840" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="after-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a1145"/>
    </linearGradient>
    <linearGradient id="hero-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="hero-text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="arrow-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="840" height="300" fill="url(#bg)"/>

  <!-- BEFORE card -->
  <rect x="24" y="24" width="370" height="252" rx="12" fill="#111118" stroke="white" stroke-opacity="0.06"/>
  <text x="44" y="52" font-family="'Courier New', monospace" font-size="10" fill="white" fill-opacity="0.3" letter-spacing="2">BEFORE</text>

  <!-- placeholder lines -->
  <rect x="44" y="68" width="220" height="12" rx="4" fill="white" fill-opacity="0.08"/>
  <rect x="44" y="90" width="320" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="105" width="260" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="120" width="300" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="135" width="180" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="150" width="290" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="165" width="320" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="180" width="200" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="195" width="270" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="210" width="310" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="225" width="160" height="7" rx="3" fill="white" fill-opacity="0.05"/>
  <rect x="44" y="240" width="250" height="7" rx="3" fill="white" fill-opacity="0.05"/>

  <!-- arrow -->
  <circle cx="420" cy="150" r="22" fill="url(#arrow-grad)" filter="url(#arrow-glow)">
    <animate attributeName="r" values="20;23;20" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="150" r="20" fill="url(#arrow-grad)"/>
  <text x="420" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white">&#x2192;</text>

  <!-- AFTER card -->
  <rect x="446" y="24" width="370" height="252" rx="12" fill="url(#after-bg)" stroke="#6366f1" stroke-opacity="0.2"/>
  <text x="466" y="52" font-family="'Courier New', monospace" font-size="10" fill="#6366f1" fill-opacity="0.6" letter-spacing="2">AFTER</text>

  <!-- hero banner -->
  <rect x="466" y="64" width="330" height="48" rx="8" fill="url(#hero-grad)" stroke="#6366f1" stroke-opacity="0.1">
    <animate attributeName="stroke-opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="631" y="94" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="url(#hero-text-grad)">Project Name</text>

  <!-- badges -->
  <rect x="570" y="120" width="32" height="14" rx="3" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.15"/>
  <text x="586" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#a5b4fc" fill-opacity="0.7">v1.0</text>

  <rect x="608" y="120" width="28" height="14" rx="3" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.15"/>
  <text x="622" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#a5b4fc" fill-opacity="0.7">MIT</text>

  <rect x="642" y="120" width="48" height="14" rx="3" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.15"/>
  <text x="666" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="6" fill="#a5b4fc" fill-opacity="0.7">PASSING</text>

  <!-- 3 columns -->
  <!-- col 1 -->
  <rect x="466" y="144" width="104" height="122" rx="6" fill="#6366f1" fill-opacity="0.04" stroke="#6366f1" stroke-opacity="0.08"/>
  <rect x="476" y="156" width="70" height="5" rx="2" fill="url(#accent-line)"/>
  <rect x="476" y="167" width="84" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="476" y="177" width="60" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="476" y="187" width="74" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="476" y="197" width="50" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>

  <!-- col 2 -->
  <rect x="579" y="144" width="104" height="122" rx="6" fill="#6366f1" fill-opacity="0.04" stroke="#6366f1" stroke-opacity="0.08"/>
  <rect x="589" y="156" width="70" height="5" rx="2" fill="url(#accent-line)"/>
  <rect x="589" y="167" width="74" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="589" y="177" width="84" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="589" y="187" width="54" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="589" y="197" width="64" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>

  <!-- col 3 -->
  <rect x="692" y="144" width="104" height="122" rx="6" fill="#6366f1" fill-opacity="0.04" stroke="#6366f1" stroke-opacity="0.08"/>
  <rect x="702" y="156" width="70" height="5" rx="2" fill="url(#accent-line)"/>
  <rect x="702" y="167" width="80" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="702" y="177" width="56" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="702" y="187" width="70" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
  <rect x="702" y="197" width="44" height="4" rx="2" fill="#a5b4fc" fill-opacity="0.08"/>
</svg>
