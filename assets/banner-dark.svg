<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" width="840" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#111127"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="30%" stop-color="#a5b4fc"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
      <animate attributeName="x1" values="-100%;0%;-100%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;100%;0%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
    <linearGradient id="badge-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3"/>
    </linearGradient>
    <!-- grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="840" height="280" fill="url(#bg)"/>

  <!-- grid -->
  <rect width="840" height="280" fill="url(#grid)"/>

  <!-- animated glows -->
  <ellipse cx="250" cy="60" rx="160" ry="160" fill="#6366f1" opacity="0.15" filter="url(#glow1)">
    <animate attributeName="cx" values="250;280;230;250" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;40;80;60" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.22;0.15" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="620" cy="230" rx="180" ry="180" fill="#06b6d4" opacity="0.12" filter="url(#glow2)">
    <animate attributeName="cx" values="620;600;640;620" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="230;250;210;230" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.18;0.12" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="520" cy="100" rx="80" ry="80" fill="#8b5cf6" opacity="0.08" filter="url(#glow1)">
    <animate attributeName="cx" values="520;540;510;520" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- title -->
  <text x="420" y="118" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#title-grad)" letter-spacing="-2">PerfectReadme</text>

  <!-- animated line -->
  <rect x="340" y="140" width="160" height="1" fill="url(#line-grad)" rx="0.5">
    <animate attributeName="width" values="120;200;120" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x" values="360;320;360" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="420" y="170" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#a5b4fc" fill-opacity="0.7" font-style="italic">craft stunning GitHub READMEs that feel like websites</text>

  <!-- badges -->
  <g transform="translate(420, 200)">
    <!-- badge 1 -->
    <rect x="-208" y="-10" width="95" height="22" rx="4" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-160" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a5b4fc" fill-opacity="0.8" letter-spacing="1">SVG ANIM</text>

    <!-- badge 2 -->
    <rect x="-103" y="-10" width="95" height="22" rx="4" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-55" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a5b4fc" fill-opacity="0.8" letter-spacing="1">DARK/LIGHT</text>

    <!-- badge 3 -->
    <rect x="2" y="-10" width="80" height="22" rx="4" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="42" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a5b4fc" fill-opacity="0.8" letter-spacing="1">LAYOUTS</text>

    <!-- badge 4 -->
    <rect x="92" y="-10" width="115" height="22" rx="4" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="149" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a5b4fc" fill-opacity="0.8" letter-spacing="1">CLAUDE SKILL</text>
  </g>
</svg>
