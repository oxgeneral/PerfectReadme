<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="840" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="840" height="380" fill="url(#bg)"/>

  <!-- ═══ Card 1: SVG Animations ═══ -->
  <g filter="url(#card-shadow)">
    <rect x="20" y="16" width="392" height="164" rx="14" fill="#111120" stroke="#6366f1" stroke-opacity="0.12"/>
    <!-- top accent line -->
    <rect x="20" y="16" width="392" height="2" rx="1" fill="url(#accent)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- icon box -->
    <rect x="40" y="36" width="44" height="44" rx="10" fill="url(#icon-bg)" stroke="#6366f1" stroke-opacity="0.15"/>
    <!-- icon: diamond/polygon -->
    <polygon points="62,46 76,58 62,70 48,58" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="62" y1="70" x2="62" y2="62" stroke="#a5b4fc" stroke-width="1.5"/>
    <polyline points="76,58 62,62 48,58" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <!-- title -->
    <text x="40" y="106" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Animated SVG Banners</text>
    <!-- description -->
    <text x="40" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">Pure SVG with SMIL animations. Gradient shimmer,</text>
    <text x="40" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">glow orbs, pulsing lines — no JavaScript needed.</text>
    <!-- tag -->
    <rect x="40" y="154" width="100" height="20" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-opacity="0.2"/>
    <text x="90" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#06b6d4" fill-opacity="0.8">&lt;animate&gt;</text>
  </g>

  <!-- ═══ Card 2: Dark/Light ═══ -->
  <g filter="url(#card-shadow)">
    <rect x="428" y="16" width="392" height="164" rx="14" fill="#111120" stroke="#6366f1" stroke-opacity="0.12"/>
    <rect x="428" y="16" width="392" height="2" rx="1" fill="url(#accent)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <!-- icon box -->
    <rect x="448" y="36" width="44" height="44" rx="10" fill="url(#icon-bg)" stroke="#6366f1" stroke-opacity="0.15"/>
    <!-- icon: sun/moon -->
    <circle cx="470" cy="58" r="8" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="470" y1="47" x2="470" y2="44" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="470" y1="72" x2="470" y2="69" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="459" y1="58" x2="456" y2="58" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="484" y1="58" x2="481" y2="58" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="462.2" y1="50.2" x2="460" y2="48" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="477.8" y1="65.8" x2="480" y2="68" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="462.2" y1="65.8" x2="460" y2="68" stroke="#a5b4fc" stroke-width="1.5"/>
    <line x1="477.8" y1="50.2" x2="480" y2="48" stroke="#a5b4fc" stroke-width="1.5"/>
    <!-- title -->
    <text x="448" y="106" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Dark &amp; Light Themes</text>
    <!-- description -->
    <text x="448" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">Every element supports both themes via &lt;picture&gt;</text>
    <text x="448" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">with prefers-color-scheme. Zero JavaScript.</text>
    <!-- tag -->
    <rect x="448" y="154" width="142" height="20" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-opacity="0.2"/>
    <text x="519" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#06b6d4" fill-opacity="0.8">&lt;picture&gt; + media</text>
  </g>

  <!-- ═══ Card 3: Layouts ═══ -->
  <g filter="url(#card-shadow)">
    <rect x="20" y="200" width="392" height="164" rx="14" fill="#111120" stroke="#6366f1" stroke-opacity="0.12"/>
    <rect x="20" y="200" width="392" height="2" rx="1" fill="url(#accent)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <!-- icon box -->
    <rect x="40" y="220" width="44" height="44" rx="10" fill="url(#icon-bg)" stroke="#6366f1" stroke-opacity="0.15"/>
    <!-- icon: grid -->
    <rect x="50" y="230" width="10" height="10" rx="2" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="64" y="230" width="10" height="10" rx="2" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="50" y="244" width="10" height="10" rx="2" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="64" y="244" width="10" height="10" rx="2" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <!-- title -->
    <text x="40" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Multi-Column Layouts</text>
    <!-- description -->
    <text x="40" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">HTML tables with width and align attributes for</text>
    <text x="40" y="326" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">structured grids and side-by-side content.</text>
    <!-- tag -->
    <rect x="40" y="338" width="100" height="20" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-opacity="0.2"/>
    <text x="90" y="352" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#06b6d4" fill-opacity="0.8">&lt;table&gt;</text>
  </g>

  <!-- ═══ Card 4: Design Philosophy ═══ -->
  <g filter="url(#card-shadow)">
    <rect x="428" y="200" width="392" height="164" rx="14" fill="#111120" stroke="#6366f1" stroke-opacity="0.12"/>
    <rect x="428" y="200" width="392" height="2" rx="1" fill="url(#accent)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite" begin="3s"/>
    </rect>
    <!-- icon box -->
    <rect x="448" y="220" width="44" height="44" rx="10" fill="url(#icon-bg)" stroke="#6366f1" stroke-opacity="0.15"/>
    <!-- icon: pen -->
    <line x1="460" y1="252" x2="474" y2="238" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="474,238 478,234 482,238 478,242" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="458" y1="254" x2="462" y2="254" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- title -->
    <text x="448" y="290" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Bold Design Philosophy</text>
    <!-- description -->
    <text x="448" y="310" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">Every README gets a unique aesthetic direction.</text>
    <text x="448" y="326" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a5b4fc" fill-opacity="0.65">Palettes matched to the project's domain.</text>
    <!-- tag -->
    <rect x="448" y="338" width="130" height="20" rx="6" fill="#06b6d4" fill-opacity="0.08" stroke="#06b6d4" stroke-opacity="0.2"/>
    <text x="513" y="352" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#06b6d4" fill-opacity="0.8">design-first</text>
  </g>
</svg>
