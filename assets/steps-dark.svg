<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" width="840" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c15"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111120"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <filter id="num-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="840" height="200" fill="url(#bg)"/>

  <!-- connecting line -->
  <rect x="200" y="55" width="440" height="2" fill="url(#line-grad)" opacity="0.25" rx="1">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ Step 1: Analyze ═══ -->
  <g>
    <!-- glow behind circle -->
    <circle cx="170" cy="56" r="30" fill="#6366f1" opacity="0.06" filter="url(#num-glow)">
      <animate attributeName="opacity" values="0.04;0.1;0.04" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- circle -->
    <circle cx="170" cy="56" r="30" fill="url(#circle-grad)" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- number -->
    <text x="170" y="63" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#a5b4fc">1</text>
    <!-- label -->
    <text x="170" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Analyze</text>
    <!-- description -->
    <text x="170" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a5b4fc" fill-opacity="0.6">Reads your project's code,</text>
    <text x="170" y="146" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a5b4fc" fill-opacity="0.6">dependencies, and purpose.</text>
  </g>

  <!-- ═══ Step 2: Design ═══ -->
  <g>
    <circle cx="420" cy="56" r="30" fill="#06b6d4" opacity="0.06" filter="url(#num-glow)">
      <animate attributeName="opacity" values="0.04;0.1;0.04" dur="4s" repeatCount="indefinite" begin="1.3s"/>
    </circle>
    <circle cx="420" cy="56" r="30" fill="url(#circle-grad)" stroke="#06b6d4" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="420" y="63" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#a5b4fc">2</text>
    <text x="420" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Design</text>
    <text x="420" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a5b4fc" fill-opacity="0.6">Chooses a bold aesthetic —</text>
    <text x="420" y="146" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a5b4fc" fill-opacity="0.6">palette, typography, animations.</text>
  </g>

  <!-- ═══ Step 3: Generate ═══ -->
  <g>
    <circle cx="670" cy="56" r="30" fill="#8b5cf6" opacity="0.06" filter="url(#num-glow)">
      <animate attributeName="opacity" values="0.04;0.1;0.04" dur="4s" repeatCount="indefinite" begin="2.6s"/>
    </circle>
    <circle cx="670" cy="56" r="30" fill="url(#circle-grad)" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="670" y="63" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#a5b4fc">3</text>
    <text x="670" y="108" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e8ecf4">Generate</text>
    <text x="670" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a5b4fc" fill-opacity="0.6">Produces README.md + SVG</text>
    <text x="670" y="146" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a5b4fc" fill-opacity="0.6">assets. Ready to push.</text>
  </g>
</svg>
