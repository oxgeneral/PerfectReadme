<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 120" width="840" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="840" height="120" fill="url(#bg)"/>

  <ellipse cx="420" cy="60" rx="300" ry="50" fill="#818cf8" opacity="0.04" filter="url(#glow)">
    <animate attributeName="opacity" values="0.02;0.05;0.02" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <rect x="120" y="25" width="600" height="50" rx="12" fill="white" stroke="#818cf8" stroke-opacity="0.15" stroke-width="1"/>

  <text x="148" y="56" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#0891b2">$</text>
  <text x="170" y="56" font-family="'Courier New', monospace" font-size="13" fill="#0e7490">claude plugin add --from-github oxgeneral/PerfectReadme</text>

  <text x="420" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#4338ca" fill-opacity="0.4">Available immediately in your next Claude Code session</text>
</svg>
